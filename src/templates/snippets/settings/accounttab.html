<div id="settings-tab-account"
     class="tab-pane fade">
    <h4 class="orange page-header">
        <i class="icon-cog bigger-110"></i>
        Account
    </h4>

    <div id="status_account" class="alert hidden"></div>

    <div class="space-8"></div>

    <form id="account-form" class="form-horizontal" role="form">
        <div class="form-group">
            <label class="col-sm-2 control-label"
                   for="id_username">Username</label>

            <div class="col-sm-5">
                <div class="input-group no-padding">
                        <span class="input-group-addon">
                            <i class="icon-user"></i>
                        </span>

                    <input class="form-control" id="id_username" maxlength="255" name="username" type="text">
                </div>
            </div>
            <div class="col-sm-5 has-error help-block">
                <span id="status_username" class="alert hidden"></span>
            </div>
        </div>

        <hr/>

        <div class="form-group">
            <label class="col-sm-2 control-label"
                   for="id_email">Email</label>

            <div class="col-sm-5">
                <div class="input-group no-padding">
                        <span class="input-group-addon">
                            <i class="icon-envelope"></i>
                        </span>

                    <input class="form-control" id="id_email" maxlength="255" name="email" type="text">
                </div>
            </div>
            <div class="col-sm-5 has-error help-block">
                <span id="status_email" class="alert hidden"></span>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-2"></div>
            <div class="col-sm-5" id="id_email_verification_status"></div>
            <div class="col-sm-5"></div>
        </div>

        <hr/>

        <div class="form-group">
            <label class="col-sm-2 control-label"
                   for="id_old_password">Current password</label>

            <div class="col-sm-5">
                <div class="input-group no-padding">
                        <span class="input-group-addon">
                            <i class="icon-lock"></i>
                        </span>

                    <input type="password" id="id_old_password" name="old_password" class="form-control"
                           maxlength="255">
                </div>
            </div>
            <div class="col-sm-5 has-error help-block">
                <span id="status_old_password" class="alert hidden"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label"
                   for="id_new_password1">New password</label>

            <div class="col-sm-5">
                <div class="input-group no-padding">
                        <span class="input-group-addon">
                            <i class="icon-lock"></i>
                        </span>

                    <input type="password" id="id_password" name="password" class="form-control"
                           maxlength="255">
                </div>
            </div>
            <div class="col-sm-5">
                <span id="new-password-error"></span>
            </div>
            <div class="col-sm-5 has-error help-block">
                <span id="status_password" class="alert hidden"></span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label"
                   for="id_new_password2">Confirm password</label>

            <div class="col-sm-5">
                <div class="input-group no-padding">
                        <span class="input-group-addon">
                            <i class="icon-retweet"></i>
                        </span>

                    <input type="password" id="id_password2" name="password2" class="form-control"
                           maxlength="255">
                </div>
            </div>
            <div class="col-sm-5 has-error help-block">
                <span id="status_password2" class="alert hidden"></span>
            </div>
        </div>

        <hr/>

        <div class="form-group col-xs-12">
            <div class="col-xs-6">
                <button class="btn btn-sm btn-danger left-buffer-15" id="delete-account">
                    <i class="icon-trash"></i>
                    Delete Account
                </button>
            </div>
            <div class="col-xs-6">
                <div id="account-loading" class="loading-mini">
                    <div id="loading-account"></div>
                </div>
                <button type="submit" class="btn btn-primary btn-sm pull-right">
                    <i class="icon-check"></i>
                    <span class="hidden-xs">Save</span>
                </button>
            </div>
        </div>
    </form>
</div>
