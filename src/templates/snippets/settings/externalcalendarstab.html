<div id="tab-externalcalendars"
     class="tab-pane fade">
    <h4 class="light-red page-header">
        <i class="icon-download-alt bigger-110"></i>
        External Calendars
        <small>
            <i class="icon-double-angle-right"></i>
            &nbsp;bring other calendars in to Helium
        </small>
    </h4>

    <div id="status_externalcalendars" class="alert hidden"></div>

    <div class="space-8"></div>

    <form class="form-horizontal" id="externalcalendars-form" role="form">
        <div class="row">
            <div class="col-sm-offset-2 col-sm-8">
                <div class="widget-box">
                    <div class="widget-header">
                        <h5 class="widget-title bigger lighter">
                            <i class="ace-icon fa fa-table"></i>
                            <span class="externalcalendars-help help-button cursor-hover"
                                  data-rel="popover"
                                  data-trigger="hover" data-container="body"
                                  data-placement="left"
                                  data-content="Enter the URL of a valid iCal feed, for example from Google or Apple Calendar. Click for more details on how to get this URL."
                                  title="External Calendars in to Helium">?</span>
                        </h5>

                        <div class="widget-toolbar no-border">
                            <button type="button" aria-label="Create External Calendar" class="btn btn-xs btn-primary"
                                    style="line-height: 10px"
                                    id="create-externalcalendar"><i class="icon-plus align-top"></i></button>
                        </div>
                    </div>

                    <div class="widget-body no-padding">
                        <div class="widget-main no-padding dataTables_wrapper form-inline dt-bootstrap no-footer">
                            <table id="externalcalendars-table"
                                   class="table table-striped table-bordered dataTable no-footer">
                                <thead class="thin-border-bottom">
                                <tr>
                                    <th colspan="1">Name</th>
                                    <th class="hidden-xs width-50" colspan="1">URL</th>
                                    <th colspan="1">Enabled</th>
                                    <th colspan="1">Color</th>
                                    <th class="hidden-xs" colspan="1"></th>
                                </tr>
                                </thead>

                                <tbody id="externalcalendars-table-body">
                                <tr id="no-externalcalendars" class="odd">
                                    <td colspan="5" class="dataTables_empty">Nothing to see here. Click "+" to add an
                                        external
                                        calendar.
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <hr/>

        <div class="form-group col-xs-12">
            <div id="externalcalendars-loading" class="loading-mini">
                <div id="loading-externalcalendars"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-sm pull-right">
                <i class="icon-check"></i>
                <span class="hidden-xs">Save</span>
            </button>
        </div>
    </form>
</div>
