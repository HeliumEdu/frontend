name: "Build"

run-name: "Build"

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: 'Run integration tests'
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
      - name: Test
        run: make test coverage
      - name: Upload test coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  integration-test:
    name: Integration Test
    if: ${{ github.actor != 'renovate[bot]' && !contains(github.event.head_commit.message, '[skip ci]') && (github.event_name != 'workflow_dispatch' || inputs.run_integration_tests) }}
    uses: ./.github/workflows/integration.yml
    with:
      suite: full
      caller: build
    secrets: inherit

  build-android:
    name: Build Android

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build Android
        run: make build-android

  build-ios:
    name: Build iOS

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        run: |
          LATEST_XCODE=$(ls /Applications | grep "^Xcode" | grep -v -E "(beta|Release_Candidate)" | sort -V | tail -n 1)
          sudo xcode-select -s /Applications/$LATEST_XCODE/Contents/Developer
          xcodebuild -version

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build iOS
        env:
          COCOAPODS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make build-ios

  build-web:
    name: Build web

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build web
        run: make build-web

  deploy-web-ci:
    name: Deploy web (CI preview)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}

    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - uses: actions/checkout@v6

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build web
        run: make build-web ENVIRONMENT=prod

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          BUCKET_NAME="heliumedu.ci.frontend-app.static"

          aws s3 sync ./build/web "s3://${BUCKET_NAME}" \
            --delete \
            --cache-control "public, max-age=2592000" \
            --exclude "index.html" \
            --exclude "*.json" \
            --exclude "main.dart.js" \
            --exclude "flutter.js" \
            --exclude "flutter_bootstrap.js" \
            --exclude "canvaskit/*"

          aws s3 cp ./build/web/index.html "s3://${BUCKET_NAME}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

          for FILE in main.dart.js flutter.js flutter_bootstrap.js; do
            if [ -f "./build/web/${FILE}" ]; then
              aws s3 cp "./build/web/${FILE}" "s3://${BUCKET_NAME}/${FILE}" \
                --cache-control "no-cache, no-store, must-revalidate" \
                --content-type "application/javascript"
            fi
          done

          find ./build/web -name "*.json" ! -path "./build/web/.well-known/*" -exec sh -c 'RELPATH="${1#./build/web/}"; aws s3 cp "$1" "s3://'"${BUCKET_NAME}"'/${RELPATH}" --cache-control "no-cache, no-store, must-revalidate" --content-type "application/json"' _ {} \;

          if [ -d ./build/web/canvaskit ]; then
            find ./build/web/canvaskit -type f -exec sh -c 'RELPATH="${1#./build/web/}"; aws s3 cp "$1" "s3://'"${BUCKET_NAME}"'/${RELPATH}" --cache-control "no-cache, no-store, must-revalidate"' _ {} \;
          fi

          if [ -d ./build/web/.well-known ]; then
            find ./build/web/.well-known -type f -exec sh -c 'RELPATH="${1#./build/web/}"; aws s3 cp "$1" "s3://'"${BUCKET_NAME}"'/${RELPATH}" --content-type "application/json" --cache-control "public, max-age=86400"' _ {} \;
          fi

      - name: Invalidate CloudFront cache
        id: cloudfront
        run: |
          DISTRIBUTION=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='heliumedu-ci-frontend-app'] | [0].{Id: Id, Domain: DomainName}" \
            --output json)

          DISTRIBUTION_ID=$(echo "$DISTRIBUTION" | jq -r '.Id // empty')
          DOMAIN_NAME=$(echo "$DISTRIBUTION" | jq -r '.Domain // empty')

          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "domain=${DOMAIN_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger canary tests
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run canary.yml \
            --repo ${{ github.repository }} \
            -f environment=ci

      - name: Deployment summary
        run: |
          echo "### CI Preview Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.cloudfront.outputs.domain }}" ]; then
            echo "- **URL**: https://${{ steps.cloudfront.outputs.domain }}" >> $GITHUB_STEP_SUMMARY
          fi

  deploy-ios-ci:
    name: Deploy iOS (CI preview)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        run: |
          LATEST_XCODE=$(ls /Applications | grep "^Xcode" | grep -v -E "(beta|Release_Candidate)" | sort -V | tail -n 1)
          sudo xcode-select -s /Applications/$LATEST_XCODE/Contents/Developer
          xcodebuild -version

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: 'Gemfile.lock'
          bundler-cache: false

      - name: Install Fastlane
        run: cd ios && bundle install

      - name: Compute CI build version
        id: ci-version
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          SEMVER="${CURRENT%%+*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          CI_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          BUILD_NUMBER=$(cd ios && bundle exec fastlane next_build_number version:"$CI_VERSION" 2>&1 | sed -n 's/.*Next build number for .*: \([0-9]*\)/\1/p' | tail -1)
          BUILD_NUMBER=${BUILD_NUMBER:-1}

          echo "build-name=${CI_VERSION}" >> $GITHUB_OUTPUT
          echo "build-number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "CI build: ${CI_VERSION}+${BUILD_NUMBER}"

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          echo "Provisioning Profile UUID: $PP_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Configure manual signing
        run: |
          sed -i '' 's/"iPhone Developer"/"iPhone Distribution"/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = SHY4MCK827;/CODE_SIGN_STYLE = Manual; DEVELOPMENT_TEAM = SHY4MCK827; PROVISIONING_PROFILE_SPECIFIER = "Helium";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS release IPA
        env:
          COCOAPODS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.ci-version.outputs.build-name }}+${{ steps.ci-version.outputs.build-number }}
        run: |
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          make build-ios-release ENVIRONMENT=prod \
            RELEASE_VERSION="$RELEASE_VERSION" SENTRY_DIST="$SENTRY_DIST" \
            BUILD_NAME=${{ steps.ci-version.outputs.build-name }} \
            BUILD_NUMBER=${{ steps.ci-version.outputs.build-number }}

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli debug-files upload build/symbols/ build/ios/archive/Runner.xcarchive/dSYMs/

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
        run: |
          cd ios
          bundle exec fastlane deploy_testflight ipa_path:../build/ios/ipa/Helium.ipa

      - name: Cleanup keychain and API key
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision
          rm -rf ~/.appstoreconnect

      - name: Deployment summary
        run: |
          echo "### iOS CI Preview Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.ci-version.outputs.build-name }}+${{ steps.ci-version.outputs.build-number }}" >> $GITHUB_STEP_SUMMARY
