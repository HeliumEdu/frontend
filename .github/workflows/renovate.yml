name: Renovate

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        env:
          RENOVATE_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          RENOVATE_REPOSITORIES: HeliumEdu/frontend
          RENOVATE_GIT_AUTHOR: "heliumedu-bot[bot] <272566303+heliumedu-bot[bot]@users.noreply.github.com>"
