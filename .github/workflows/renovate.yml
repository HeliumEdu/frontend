name: Renovate

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

concurrency:
  group: helium-frontend-renovate

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_REPOSITORIES: HeliumEdu/frontend
          RENOVATE_GIT_AUTHOR: "heliumedu-bot[bot] <272566303+heliumedu-bot[bot]@users.noreply.github.com>"
