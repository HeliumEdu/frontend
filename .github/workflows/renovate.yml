name: Renovate

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        env:
          RENOVATE_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
