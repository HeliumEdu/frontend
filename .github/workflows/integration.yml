name: "Integration Tests"

run-name: "Integration Tests (`${{ inputs.suite }}` on `${{ inputs.environment }}`)"

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        type: choice
        default: full
        options:
          - smoke
          - full
      environment:
        description: 'Environment to test against'
        required: true
        type: choice
        default: dev-local
        options:
          - dev-local
          - dev
          - prod
      platform_version:
        description: 'Platform version (for dev-local only, e.g. "arm64-latest" or "amd64-1.0.0")'
        required: false
        type: string
        default: 'amd64-latest'
      log_level:
        description: 'Integration test log level'
        required: false
        type: choice
        default: fine
        options:
          - info
          - fine
          - finer
  workflow_call:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        type: string
        default: 'smoke'
      environment:
        description: 'Environment to test against'
        required: false
        type: string
        default: 'dev-local'
      platform_version:
        description: 'Platform version (for dev-local only)'
        required: false
        type: string
        default: 'amd64-latest'
      log_level:
        description: 'Integration test log level'
        required: false
        type: string
        default: 'fine'
      caller:
        description: 'Workflow that called this (build, release, etc.) - used to isolate concurrency groups'
        required: false
        type: string
        default: 'manual'

permissions:
  contents: read

concurrency:
  group: "integration-tests-${{inputs.environment}}"
  cancel-in-progress: false

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev-local' }}
      AWS_INTEGRATION_S3_ACCESS_KEY_ID: ${{ secrets.AWS_INTEGRATION_S3_ACCESS_KEY_ID }}
      AWS_INTEGRATION_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_INTEGRATION_S3_SECRET_ACCESS_KEY }}
      PLATFORM_EMAIL_HOST_USER: ${{ secrets.PLATFORM_EMAIL_HOST_USER }}
      PLATFORM_EMAIL_HOST_PASSWORD: ${{ secrets.PLATFORM_EMAIL_HOST_PASSWORD }}
      PLATFORM: amd64

    steps:
      - uses: actions/checkout@v5

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(cat .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start ChromeDriver
        run: chromedriver --port=4444 &

      - name: Install dependencies
        run: make install

      # dev-local: Login to ECR to avoid rate limits
      - name: Configure AWS credentials (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to AWS ECR Public (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/heliumedu

      - name: Set platform image versions (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          VERSION="${{ inputs.platform_version || 'amd64-latest' }}"
          echo "PLATFORM_RESOURCE_IMAGE=public.ecr.aws/heliumedu/helium/platform-resource:$VERSION" >> $GITHUB_ENV
          echo "PLATFORM_API_IMAGE=public.ecr.aws/heliumedu/helium/platform-api:$VERSION" >> $GITHUB_ENV
          echo "PLATFORM_WORKER_IMAGE=public.ecr.aws/heliumedu/helium/platform-worker:$VERSION" >> $GITHUB_ENV

      - name: Pre-pull platform images (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          echo "Pulling platform images ..."
          docker pull "$PLATFORM_RESOURCE_IMAGE" &
          docker pull "$PLATFORM_API_IMAGE" &
          docker pull "$PLATFORM_WORKER_IMAGE" &
          docker pull localstack/localstack:4.13.1 &
          docker pull redis:7-alpine &
          docker pull mysql:8 &
          wait
          echo "All images pulled"

      - name: Run integration tests
        run: |
          if [ "${{ inputs.suite }}" = "smoke" ]; then
            make test-integration-smoke \
              ENVIRONMENT=${{ env.ENVIRONMENT }} \
              INTEGRATION_LOG_LEVEL=${{ inputs.log_level || 'fine' }}
          else
            make test-integration \
              ENVIRONMENT=${{ env.ENVIRONMENT }} \
              INTEGRATION_LOG_LEVEL=${{ inputs.log_level || 'fine' }} \
              INTEGRATION_EMAIL_SUFFIX=github-frontend \
              AWS_INTEGRATION_S3_ACCESS_KEY_ID="${{ env.AWS_INTEGRATION_S3_ACCESS_KEY_ID }}" \
              AWS_INTEGRATION_S3_SECRET_ACCESS_KEY="${{ env.AWS_INTEGRATION_S3_SECRET_ACCESS_KEY }}"
          fi

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-screenshots
          path: build/integration-screenshots/
          if-no-files-found: ignore
          retention-days: 30
