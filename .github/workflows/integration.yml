name: "Integration Tests"

run-name: "Integration Tests (`${{ inputs.suite }}` on `${{ inputs.environment }}`)"

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        type: choice
        default: full
        options:
          - smoke
          - full
      environment:
        description: 'Environment to test against'
        required: true
        type: choice
        default: dev-local
        options:
          - dev-local
          - dev
          - prod
      platform_version:
        description: 'Platform version (for dev-local only, e.g. "arm64-latest" or "amd64-1.0.0")'
        required: false
        type: string
        default: 'amd64-latest'
      log_level:
        description: 'Integration test log level'
        required: false
        type: choice
        default: fine
        options:
          - info
          - fine
          - finer
  workflow_call:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        type: string
        default: 'smoke'
      environment:
        description: 'Environment to test against'
        required: false
        type: string
        default: 'dev-local'
      platform_version:
        description: 'Platform version (for dev-local only)'
        required: false
        type: string
        default: 'amd64-latest'
      log_level:
        description: 'Integration test log level'
        required: false
        type: string
        default: 'fine'
      caller:
        description: 'Workflow that called this (build, release, etc.) - used to isolate concurrency groups'
        required: false
        type: string
        default: 'manual'

permissions:
  contents: read

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev-local' }}
      INTEGRATION_EMAIL_SUFFIX: github-frontend-${{ github.run_id }}
      AWS_INTEGRATION_S3_ACCESS_KEY_ID: ${{ secrets.AWS_INTEGRATION_S3_ACCESS_KEY_ID }}
      AWS_INTEGRATION_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_INTEGRATION_S3_SECRET_ACCESS_KEY }}
      PLATFORM_EMAIL_HOST_USER: ${{ secrets.PLATFORM_EMAIL_HOST_USER }}
      PLATFORM_EMAIL_HOST_PASSWORD: ${{ secrets.PLATFORM_EMAIL_HOST_PASSWORD }}
      PLATFORM: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Chrome version
        id: chrome-version
        run: echo "version=$(google-chrome-stable --version | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache ChromeDriver
        id: cache-chromedriver
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/chromedriver
          key: ${{ runner.os }}-chromedriver-${{ steps.chrome-version.outputs.version }}

      - name: Install ChromeDriver
        if: steps.cache-chromedriver.outputs.cache-hit != 'true'
        uses: nanasess/setup-chromedriver@v2

      - name: Start ChromeDriver
        run: chromedriver --port=4444 &

      - name: Install dependencies
        run: make install

      # dev-local: Login to ECR to avoid rate limits
      - name: Configure AWS credentials (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to AWS ECR Public (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/heliumedu

      - name: Set platform image versions (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          VERSION="${{ inputs.platform_version || 'amd64-latest' }}"
          echo "PLATFORM_RESOURCE_IMAGE=public.ecr.aws/heliumedu/helium/platform-resource:$VERSION" >> $GITHUB_ENV
          echo "PLATFORM_API_IMAGE=public.ecr.aws/heliumedu/helium/platform-api:$VERSION" >> $GITHUB_ENV
          echo "PLATFORM_WORKER_IMAGE=public.ecr.aws/heliumedu/helium/platform-worker:$VERSION" >> $GITHUB_ENV

      - name: Pre-pull platform images (dev-local only)
        if: ${{ inputs.environment == 'dev-local' }}
        run: |
          echo "Pulling platform images ..."
          docker pull "$PLATFORM_RESOURCE_IMAGE" &
          docker pull "$PLATFORM_API_IMAGE" &
          docker pull "$PLATFORM_WORKER_IMAGE" &
          docker pull localstack/localstack:4.13.1 &
          docker pull redis:7-alpine &
          docker pull mysql:8 &
          wait
          echo "All images pulled"

      - name: Run integration tests
        run: |
          if [ "${{ inputs.suite }}" = "smoke" ]; then
            make test-integration-smoke \
              ENVIRONMENT=${{ env.ENVIRONMENT }} \
              INTEGRATION_LOG_LEVEL=${{ inputs.log_level || 'fine' }}
          else
            make test-integration \
              ENVIRONMENT=${{ env.ENVIRONMENT }} \
              INTEGRATION_LOG_LEVEL=${{ inputs.log_level || 'fine' }} \
              INTEGRATION_EMAIL_SUFFIX="${{ env.INTEGRATION_EMAIL_SUFFIX }}" \
              AWS_INTEGRATION_S3_ACCESS_KEY_ID="${{ env.AWS_INTEGRATION_S3_ACCESS_KEY_ID }}" \
              AWS_INTEGRATION_S3_SECRET_ACCESS_KEY="${{ env.AWS_INTEGRATION_S3_SECRET_ACCESS_KEY }}"
          fi

      - name: Cleanup test account
        if: always()
        run: |
          PASSWORD="IntegrationTestPassword123!"
          ENVIRONMENT="${{ env.ENVIRONMENT }}"
          EMAIL_SUFFIX="${{ env.INTEGRATION_EMAIL_SUFFIX }}"

          if [ "$ENVIRONMENT" = "dev-local" ]; then
            API_HOST="http://localhost:8000"
            EMAIL_DOMAIN="dev-local.heliumedu.dev"
          elif [ "$ENVIRONMENT" = "prod" ]; then
            API_HOST="https://api.heliumedu.com"
            EMAIL_DOMAIN="heliumedu.dev"
          else
            API_HOST="https://api.${ENVIRONMENT}.heliumedu.com"
            EMAIL_DOMAIN="${ENVIRONMENT}.heliumedu.dev"
          fi

          EMAIL="heliumedu-cluster+${EMAIL_SUFFIX}@${EMAIL_DOMAIN}"

          LOGIN=$(curl -s -X POST "${API_HOST}/auth/token/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${EMAIL}\", \"password\": \"${PASSWORD}\"}" 2>/dev/null || echo "{}")
          TOKEN=$(echo "$LOGIN" | jq -r '.access // empty')

          if [ -n "$TOKEN" ]; then
            curl -s -X DELETE "${API_HOST}/auth/user/delete/" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -d "{\"password\": \"${PASSWORD}\"}" || true
          else
            curl -s -X DELETE "${API_HOST}/auth/user/delete/inactive/" \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${EMAIL}\", \"password\": \"${PASSWORD}\"}" || true
          fi

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: integration-screenshots
          path: build/integration-screenshots/
          if-no-files-found: ignore
          retention-days: 30
