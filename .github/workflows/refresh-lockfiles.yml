name: "Refresh Lockfiles"

run-name: "Refresh Lockfiles"

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to check out and push lockfile updates to'
        required: false
        type: string
        default: 'main'
      pod_update:
        description: 'Run pod update instead of pod install (use for dependency bumps)'
        required: false
        type: boolean
        default: false
      skip_ci:
        description: 'Add [skip ci] to the commit message'
        required: false
        type: boolean
        default: false
    outputs:
      commit_sha:
        description: 'SHA of the commit after lockfile refresh'
        value: ${{ jobs.refresh-lockfiles.outputs.commit_sha }}

permissions:
  contents: write

jobs:
  refresh-lockfiles:
    name: Refresh Lockfiles

    runs-on: macos-latest

    outputs:
      commit_sha: ${{ steps.commit_lockfiles.outputs.commit_sha }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.ref || 'main' }}

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Refresh lockfiles
        env:
          COCOAPODS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flutter pub get
          cd ios
          ${{ inputs.pod_update && 'pod update' || 'pod install' }}

      - name: Get GitHub App bot user ID
        id: get-bot-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Commit lockfile refresh
        id: commit_lockfiles
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add pubspec.lock ios/Podfile.lock

          UNEXPECTED_FILES=$(git status --porcelain | awk '{print $2}' | grep -Ev '^(pubspec.lock|ios/Podfile.lock)$' || true)
          if [ -n "$UNEXPECTED_FILES" ]; then
            echo "Unexpected file changes detected:"
            echo "$UNEXPECTED_FILES"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "Lockfiles already up to date."
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="${{ inputs.skip_ci && '[skip ci] ' || '' }}Refresh lockfiles"
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:refs/heads/${{ inputs.ref || 'main' }}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
