name: "Canary Tests"

run-name: "Canary Tests (on `${{ inputs.environment || 'prod' }}`)"

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        type: choice
        default: prod
        options:
          - ci
          - dev
          - prod

permissions:
  contents: read

concurrency:
  group: "canary-${{ inputs.environment || 'prod' }}"
  cancel-in-progress: false

jobs:
  check:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Check PROJECT_CI_APP_HOST for ci environment
        id: check
        env:
          PROJECT_CI_APP_HOST: ${{ secrets.PROJECT_CI_APP_HOST }}
        run: |
          if [ "${{ inputs.environment || 'prod' }}" = "ci" ] && [ -z "$PROJECT_CI_APP_HOST" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  canary:
    name: Canary Tests
    needs: [check]
    if: needs.check.outputs.should_run == 'true'

    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      ENVIRONMENT: ${{ inputs.environment || 'prod' }}
      PROJECT_CI_APP_HOST: ${{ secrets.PROJECT_CI_APP_HOST }}
      PLAYWRIGHT_SMOKE_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_SMOKE_TEST_EMAIL }}
      PLAYWRIGHT_SMOKE_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_SMOKE_TEST_PASSWORD }}
      PLATFORM_FIREBASE_PROJECT_ID: ${{ secrets.PLATFORM_FIREBASE_PROJECT_ID }}
      PLATFORM_FIREBASE_CLIENT_EMAIL: ${{ secrets.PLATFORM_FIREBASE_CLIENT_EMAIL }}
      PLATFORM_FIREBASE_PRIVATE_KEY: ${{ secrets.PLATFORM_FIREBASE_PRIVATE_KEY }}
      PLATFORM_APPLE_KEY_P8: ${{ secrets.PLATFORM_APPLE_KEY_P8 }}
      PLATFORM_APPLE_KEY_ID: ${{ secrets.PLATFORM_APPLE_KEY_ID }}
      PLATFORM_APPLE_CLIENT_ID: ${{ secrets.PLATFORM_APPLE_CLIENT_ID }}
      APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: canary_test/requirements.txt

      - name: Install dependencies
        run: pip install -r canary_test/requirements.txt

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | grep Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: python -m playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Run canary tests
        run: cd canary_test && python -m pytest -v --screenshot=only-on-failure --output=screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: canary-screenshots
          path: canary_test/screenshots/
          if-no-files-found: ignore
          retention-days: 7
