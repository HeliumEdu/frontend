name: Pull Store Metadata

# Manually-triggered workflow that pulls the current live App Store Connect and
# Google Play Console listings into fastlane/metadata/ and opens a PR.
#
# Treats the live store listings as the source of truth. Does NOT change deploy
# behavior — Fastfile `skip_metadata` / `skip_upload_metadata` flags remain set.
# Flipping those is a deliberate follow-up after reviewing the pulled state.

on:
  workflow_dispatch:

jobs:
  pull-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install iOS fastlane gems
        working-directory: ios
        run: bundle install

      - name: Install Android fastlane gems
        working-directory: android
        run: bundle install

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          cat > ~/app_store_connect_api_key.json <<EOF
          {
            "key_id": "${APP_STORE_CONNECT_API_KEY_ID}",
            "issuer_id": "${APP_STORE_CONNECT_API_ISSUER_ID}",
            "key_filepath": "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8",
            "duration": 1200,
            "in_house": false
          }
          EOF

      - name: Write Google Play service account key
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
        run: echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" > android/service-account-key.json

      - name: Download iOS metadata from App Store Connect
        working-directory: ios
        run: |
          bundle exec fastlane deliver download_metadata \
            --api_key_path ~/app_store_connect_api_key.json \
            --force

      - name: Download Android metadata from Play Console
        working-directory: android
        run: bundle exec fastlane supply init --json_key service-account-key.json

      - name: Clean up credentials
        if: always()
        run: |
          rm -rf ~/.appstoreconnect/private_keys
          rm -f ~/app_store_connect_api_key.json
          rm -f android/service-account-key.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Pull store metadata from live App Store and Play Console listings"
          title: "Pull store metadata from live listings"
          body: |
            Snapshot of current App Store Connect and Google Play Console metadata, pulled into version control via:

            - `fastlane deliver download_metadata` (iOS) -> `ios/fastlane/metadata/`
            - `fastlane supply init` (Android) -> `android/fastlane/metadata/android/`

            **Review checklist:**
            - [ ] iOS locale folders and copy match what's live in App Store Connect
            - [ ] Android locale folders and copy match what's live in Play Console
            - [ ] No credential files leaked (no `*.p8`, no `service-account-key.json`)
            - [ ] Screenshots / images (Android only — `supply init` pulls them) look correct, or are intentionally pruned

            **Does not change deploy behavior.** Fastfile lanes still have `skip_metadata: true` / `skip_upload_metadata: true`. Flipping those is a separate, deliberate follow-up PR.
          branch: chore/pull-store-metadata
          delete-branch: true
          add-paths: |
            ios/fastlane/metadata/**
            android/fastlane/metadata/**
