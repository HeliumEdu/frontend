name: Auto-Approve Renovate PRs

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  autoapprove:
    name: Auto-Approve Renovate PRs
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
