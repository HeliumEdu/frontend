name: "Release"

run-name: "Release `${{ inputs.bump_type }}`"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: build
        options:
          - build
          - patch
          - minor
          - major
      run_integration_tests:
        description: 'Run integration tests'
        required: true
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: 'Trigger deploy after release'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: prod
        options:
          - dev
          - prod
      platforms:
        description: 'Platforms to deploy'
        required: true
        type: choice
        default: all
        options:
          - all
          - web
          - android
          - ios
  workflow_call:
    inputs:
      bump_type:
        description: "Version bump type"
        required: false
        type: string
        default: build
      run_integration_tests:
        description: "Run integration tests"
        required: false
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: "Trigger deploy after release"
        required: false
        type: boolean
        default: true
      environment:
        description: "Environment to deploy to"
        required: false
        type: string
        default: prod
      platforms:
        description: "Platforms to deploy"
        required: false
        type: string
        default: all
    outputs:
      version:
        description: "Released version"
        value: ${{ jobs.bump-version.outputs.version }}

permissions:
  contents: write

jobs:
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create_branch.outputs.branch_name }}
      base_sha: ${{ steps.create_branch.outputs.base_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ github.sha }}

      - name: Create and push release branch
        id: create_branch
        run: |
          BRANCH_NAME="release/${{ github.run_id }}-${{ github.run_attempt }}"
          BASE_SHA="$(git rev-parse HEAD)"

          git push origin "HEAD:refs/heads/${BRANCH_NAME}"

          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    needs: [create-release-branch]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['create-release-branch'].outputs.base_sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Test
        run: make test

  integration-test:
    name: Integration Test
    needs: [create-release-branch]
    if: ${{ inputs.run_integration_tests == true || inputs.run_integration_tests == 'true' }}
    uses: ./.github/workflows/integration.yml
    with:
      suite: full
      caller: release
    secrets: inherit

  refresh-lockfiles:
    name: Refresh Lockfiles
    needs: [create-release-branch]
    runs-on: macos-latest
    outputs:
      commit_sha: ${{ steps.commit_lockfiles.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ needs['create-release-branch'].outputs.branch_name }}

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Refresh lockfiles
        run: |
          flutter pub get
          cd ios
          pod install

      - name: Commit lockfile refresh
        id: commit_lockfiles
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "<support@heliumedu.com>"

          git add pubspec.lock ios/Podfile.lock

          UNEXPECTED_FILES=$(git status --porcelain | awk '{print $2}' | grep -Ev '^(pubspec.lock|ios/Podfile.lock)$' || true)
          if [ -n "$UNEXPECTED_FILES" ]; then
            echo "Unexpected file changes detected:"
            echo "$UNEXPECTED_FILES"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "Lockfiles already up to date."
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Refresh lockfiles"
          git push origin "HEAD:refs/heads/${{ needs['create-release-branch'].outputs.branch_name }}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  bump-version:
    name: Bump Version
    needs: [create-release-branch, test, integration-test, refresh-lockfiles]
    if: always() && needs.test.result == 'success' && needs['refresh-lockfiles'].result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      semver: ${{ steps.get_version.outputs.semver }}
      build_number: ${{ steps.get_version.outputs.build_number }}
      commit_sha: ${{ steps.get_commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ needs['refresh-lockfiles'].outputs.commit_sha }}

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: make install

      - name: Bump version
        run: |
          dart run cider bump build
          if [ "${{ inputs.bump_type }}" != "build" ]; then
            dart run cider bump ${{ inputs.bump_type }} --keep-build
          fi

      - name: Commit version bump
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "<support@heliumedu.com>"

          git add pubspec.yaml

          git commit -m "Bump version to $(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r\n')"

          git push origin "HEAD:refs/heads/${{ needs['create-release-branch'].outputs.branch_name }}"

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r\n')
          SEMVER="${VERSION%%+*}"
          BUILD_NUMBER="${VERSION##*+}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get commit SHA
        id: get_commit
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "Commit SHA: $COMMIT_SHA"

  merge-release-branch:
    name: Merge Release Branch to Main
    needs: [create-release-branch, bump-version]
    if: always() && needs['create-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest
    outputs:
      merged_commit_sha: ${{ steps.merge.outputs.merged_commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Merge release branch
        id: merge
        env:
          RELEASE_BRANCH: ${{ needs['create-release-branch'].outputs.branch_name }}
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "<support@heliumedu.com>"

          git fetch origin "$RELEASE_BRANCH" main
          git checkout -B main origin/main
          git merge --no-ff --no-edit "origin/$RELEASE_BRANCH"
          git push origin main

          echo "merged_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cleanup release branch
        if: always()
        env:
          RELEASE_BRANCH: ${{ needs['create-release-branch'].outputs.branch_name }}
        run: |
          git push origin --delete "$RELEASE_BRANCH" || true

      - name: Merge main to develop
        if: success()
        run: |
          git fetch origin develop
          git checkout -B develop origin/develop
          if git merge --no-ff --no-edit origin/main; then
            git push origin develop
            echo "Successfully merged main to develop"
          else
            echo "::warning::Merge conflict detected when merging main to develop. Manual merge required."
            git merge --abort
          fi

  build-android-release:
    name: Build Android Release AAB
    needs: [merge-release-branch, bump-version]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/android/helium-release-key.jks

      - name: Clean build artifacts
        run: flutter clean

      - name: Build Android release AAB
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_FILE: ${{ github.workspace }}/android/helium-release-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          SENTRY_RELEASE: ${{ needs['bump-version'].outputs.version }}
        run: |
          SENTRY_DIST="${SENTRY_RELEASE##*+}"
          make build-android-release SENTRY_RELEASE="$SENTRY_RELEASE" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli debug-files upload build/symbols/

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: helium-${{ needs['bump-version'].outputs.version }}-android.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/android/helium-release-key.jks

  build-ios-release:
    name: Build iOS Release IPA
    needs: [merge-release-branch, bump-version]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}

      - name: Select latest stable Xcode
        run: |
          LATEST_XCODE=$(ls /Applications | grep "^Xcode" | grep -v -E "(beta|Release_Candidate)" | sort -V | tail -n 1)
          sudo xcode-select -s /Applications/$LATEST_XCODE/Contents/Developer
          xcodebuild -version

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create variables
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          # Import provisioning profile from secrets
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Extract UUID from provisioning profile
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          echo "Provisioning Profile UUID: $PP_UUID"

          # Copy to the correct location with UUID as filename (required by Xcode)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Configure manual signing
        run: |
          # Update Xcode project to use manual signing for Release
          sed -i '' 's/"iPhone Developer"/"iPhone Distribution"/g' ios/Runner.xcodeproj/project.pbxproj

          # Inject manual signing settings alongside DEVELOPMENT_TEAM
          sed -i '' 's/DEVELOPMENT_TEAM = SHY4MCK827;/CODE_SIGN_STYLE = Manual; DEVELOPMENT_TEAM = SHY4MCK827; PROVISIONING_PROFILE_SPECIFIER = "Helium";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Clean build artifacts
        run: flutter clean

      - name: Build iOS release IPA
        env:
          SENTRY_RELEASE: ${{ needs['bump-version'].outputs.version }}
        run: |
          SENTRY_DIST="${SENTRY_RELEASE##*+}"
          make build-ios-release SENTRY_RELEASE="$SENTRY_RELEASE" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli debug-files upload build/symbols/ build/ios/archive/Runner.xcarchive/dSYMs/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: helium-${{ needs['bump-version'].outputs.version }}-ios.ipa
          path: build/ios/ipa/Helium.ipa
          retention-days: 30

      - name: Cleanup keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

  build-web-release:
    name: Build Web Release Bundle
    needs: [merge-release-branch, bump-version]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Clean build artifacts
        run: flutter clean

      - name: Build web release bundle
        env:
          SENTRY_RELEASE: ${{ needs['bump-version'].outputs.version }}
        run: |
          SENTRY_DIST="${SENTRY_RELEASE##*+}"
          make build-web SENTRY_RELEASE="$SENTRY_RELEASE" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ${{ needs['bump-version'].outputs.version }}
        run: |
          npm install -g @sentry/cli
          SENTRY_DIST="${SENTRY_RELEASE##*+}"
          test -f build/web/main.dart.js.map
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases new "$SENTRY_RELEASE"
          SENTRY_PROPERTIES=sentry.properties sentry-cli sourcemaps upload \
            --release "$SENTRY_RELEASE" \
            --dist "$SENTRY_DIST" \
            --rewrite \
            --validate \
            --url-prefix "~/" \
            build/web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: helium-${{ needs['bump-version'].outputs.version }}-web
          path: build/web
          include-hidden-files: true
          retention-days: 30

  build-and-publish-web:
    name: Build and Publish Web Containers
    needs: [merge-release-branch, bump-version]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PLATFORM: amd64
      TAG_VERSION: ${{ needs['bump-version'].outputs.version }}
      ENVIRONMENT: prod

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to AWS ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/heliumedu

      - name: Build and publish web containers
        env:
          SENTRY_RELEASE: ${{ needs['bump-version'].outputs.version }}
        run: |
          SENTRY_DIST="${SENTRY_RELEASE##*+}"
          make publish SENTRY_RELEASE="$SENTRY_RELEASE" SENTRY_DIST="$SENTRY_DIST"

  create-release-tag:
    name: Create Release Tag
    needs: [merge-release-branch, bump-version, build-android-release, build-ios-release, build-web-release, build-and-publish-web]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success' && (needs['build-android-release'].result == 'success' || needs['build-android-release'].result == 'skipped') && (needs['build-ios-release'].result == 'success' || needs['build-ios-release'].result == 'skipped') && (needs['build-web-release'].result == 'success' || needs['build-web-release'].result == 'skipped') && (needs['build-and-publish-web'].result == 'success' || needs['build-and-publish-web'].result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Display release info
        run: |
          echo "### Release ${{ needs['bump-version'].outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Create and push tag
        env:
          FULL_VERSION: ${{ needs['bump-version'].outputs.version }}
          COMMIT_SHA: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "<support@heliumedu.com>"

          # Fetch latest changes to ensure we have the merge commit
          git fetch origin main

          # Create full version tag (1.0.29+29) on the specific commit
          if git rev-parse "$FULL_VERSION" >/dev/null 2>&1; then
            echo "Tag $FULL_VERSION already exists, skipping"
          else
            echo "Creating tag $FULL_VERSION on commit $COMMIT_SHA"
            git tag -a "$FULL_VERSION" -m "Release $FULL_VERSION" "$COMMIT_SHA"
          fi

          git push origin "$FULL_VERSION"

      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VERSION: ${{ needs['bump-version'].outputs.version }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases new "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases set-commits --auto "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases finalize "$VERSION"

  deploy:
    name: Trigger Deploy Workflow
    needs: [create-release-tag, bump-version]
    if: always() && (inputs.trigger_deploy_after_release == true || inputs.trigger_deploy_after_release == 'true') && needs['create-release-tag'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          VERSION: ${{ needs['bump-version'].outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            -f version_type=specific \
            -f specific_version="$VERSION" \
            -f environment="$ENVIRONMENT" \
            -f platforms="$PLATFORMS"

      - name: Deployment trigger summary
        env:
          VERSION: ${{ needs['bump-version'].outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          echo "### Deploy Workflow Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: $PLATFORMS" >> $GITHUB_STEP_SUMMARY
