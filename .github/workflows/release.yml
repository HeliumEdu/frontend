name: "Release"

run-name: "Release `${{ inputs.bump_type }}`"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: build
        options:
          - build
          - patch
          - minor
          - major
      run_integration_tests:
        description: 'Run integration tests'
        required: true
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: 'Trigger deploy after release'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: prod
        options:
          - dev
          - prod
      platforms:
        description: 'Platforms to deploy'
        required: true
        type: choice
        default: all
        options:
          - all
          - web
          - android
          - ios
  workflow_call:
    inputs:
      bump_type:
        description: "Version bump type"
        required: false
        type: string
        default: build
      run_integration_tests:
        description: "Run integration tests"
        required: false
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: "Trigger deploy after release"
        required: false
        type: boolean
        default: true
      environment:
        description: "Environment to deploy to"
        required: false
        type: string
        default: prod
      platforms:
        description: "Platforms to deploy"
        required: false
        type: string
        default: all
    outputs:
      version:
        description: "Released version"
        value: ${{ jobs.prereq.outputs.version }}

permissions:
  contents: write

concurrency:
  group: helium-frontend-release

jobs:
  prereq:
    uses: HeliumEdu/.github/.github/workflows/release-prereq.yml@main
    with:
      bump_type: ${{ inputs.bump_type }}
      bump_command: |
        CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //; s/[[:space:]]//g')
        CURRENT_BUILD="${CURRENT_VERSION##*+}"
        NEW_BUILD=$((CURRENT_BUILD + 1))
        NEW_VERSION="${SEED_VERSION}+${NEW_BUILD}"
        sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
      read_version_command: |
        grep '^version:' pubspec.yaml | sed 's/version: //; s/[[:space:]]//g'
      repo_slug: HeliumEdu/frontend
    secrets:
      bot_app_id: ${{ secrets.HELIUM_BOT_APP_ID }}
      bot_private_key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}

  test:
    name: Test
    needs: [prereq]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Test
        run: make test

  integration-test:
    name: Integration Test
    needs: [prereq]
    if: ${{ inputs.run_integration_tests == true || inputs.run_integration_tests == 'true' }}
    uses: ./.github/workflows/integration.yml
    with:
      suite: full
      caller: release
    secrets: inherit

  build-android-release:
    name: Build Android Release AAB
    needs: [prereq, test, integration-test]
    if: "!cancelled() && needs.prereq.result == 'success' && needs.test.result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/*.gradle*

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/android/helium-release-key.jks

      - name: Clean build artifacts
        run: flutter clean

      - name: Build Android release AAB
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_FILE: ${{ github.workspace }}/android/helium-release-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          RELEASE_VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          make build-android-release RELEASE_VERSION="$RELEASE_VERSION" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli debug-files upload build/symbols/

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: helium-${{ needs.prereq.outputs.version }}-android.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/android/helium-release-key.jks

  build-ios-release:
    name: Build iOS Release IPA
    needs: [prereq, test, integration-test]
    if: "!cancelled() && needs.prereq.result == 'success' && needs.test.result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')"
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Select latest stable Xcode
        run: |
          LATEST_XCODE=$(ls /Applications | grep "^Xcode" | grep -v -E "(beta|Release_Candidate)" | sort -V | tail -n 1)
          sudo xcode-select -s /Applications/$LATEST_XCODE/Contents/Developer
          xcodebuild -version

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          echo "Provisioning Profile UUID: $PP_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Configure manual signing
        run: |
          sed -i '' 's/"iPhone Developer"/"iPhone Distribution"/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = SHY4MCK827;/CODE_SIGN_STYLE = Manual; DEVELOPMENT_TEAM = SHY4MCK827; PROVISIONING_PROFILE_SPECIFIER = "Helium";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Clean build artifacts
        run: flutter clean

      - name: Build iOS release IPA
        env:
          COCOAPODS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          make build-ios-release RELEASE_VERSION="$RELEASE_VERSION" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli debug-files upload build/symbols/ build/ios/archive/Runner.xcarchive/dSYMs/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: helium-${{ needs.prereq.outputs.version }}-ios.ipa
          path: build/ios/ipa/Helium.ipa
          retention-days: 30

      - name: Cleanup keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

  build-web-release:
    name: Build Web Release Bundle
    needs: [prereq, test, integration-test]
    if: "!cancelled() && needs.prereq.result == 'success' && needs.test.result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Clean build artifacts
        run: flutter clean

      - name: Build web release bundle
        env:
          RELEASE_VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          make build-web RELEASE_VERSION="$RELEASE_VERSION" SENTRY_DIST="$SENTRY_DIST"

      - name: Upload source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELEASE_VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          npm install -g @sentry/cli
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          test -f build/web/main.dart.js.map
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases new "$RELEASE_VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli sourcemaps upload \
            --release "$RELEASE_VERSION" \
            --dist "$SENTRY_DIST" \
            --rewrite \
            --validate \
            --url-prefix "~/" \
            build/web

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: helium-${{ needs.prereq.outputs.version }}-web
          path: build/web
          include-hidden-files: true
          retention-days: 30

  build-and-publish-web:
    name: Build and Publish Web Containers
    needs: [prereq, test, integration-test]
    if: "!cancelled() && needs.prereq.result == 'success' && needs.test.result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PLATFORM: amd64
      TAG_VERSION: ${{ needs.prereq.outputs.version }}
      ENVIRONMENT: prod

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to AWS ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/heliumedu

      - name: Build and publish web containers
        env:
          RELEASE_VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          SENTRY_DIST="${RELEASE_VERSION##*+}"
          make publish RELEASE_VERSION="$RELEASE_VERSION" SENTRY_DIST="$SENTRY_DIST"

  create-release-tag:
    name: Create Release Tag
    needs: [prereq, build-android-release, build-ios-release, build-web-release, build-and-publish-web]
    if: "!cancelled() && needs.prereq.result == 'success' && needs['build-android-release'].result == 'success' && needs['build-ios-release'].result == 'success' && needs['build-web-release'].result == 'success' && needs['build-and-publish-web'].result == 'success'"
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}
          fetch-depth: 0

      - name: Get GitHub App bot user ID
        id: get-bot-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          FULL_VERSION: ${{ needs.prereq.outputs.version }}
          COMMIT_SHA: ${{ needs.prereq.outputs.squash_commit_sha }}
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.get-bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          if git rev-parse "$FULL_VERSION" >/dev/null 2>&1; then
            echo "Tag $FULL_VERSION already exists, skipping"
          else
            echo "Creating tag $FULL_VERSION on commit $COMMIT_SHA"
            git tag -a "$FULL_VERSION" -m "Release $FULL_VERSION" "$COMMIT_SHA"
            git push origin "$FULL_VERSION"
          fi

      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VERSION: ${{ needs.prereq.outputs.version }}
        run: |
          npm install -g @sentry/cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases new "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases set-commits --auto "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases finalize "$VERSION"

  deploy:
    name: Trigger Deploy Workflow
    needs: [prereq, create-release-tag]
    if: "!cancelled() && (inputs.trigger_deploy_after_release == true || inputs.trigger_deploy_after_release == 'true') && needs.prereq.result == 'success' && needs['create-release-tag'].result == 'success'"
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HELIUM_BOT_APP_ID }}
          private-key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.prereq.outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            -f version_type=specific \
            -f specific_version="$VERSION" \
            -f environment="$ENVIRONMENT" \
            -f platforms="$PLATFORMS"

      - name: Deployment trigger summary
        env:
          VERSION: ${{ needs.prereq.outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          echo "### Deploy Workflow Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: $PLATFORMS" >> $GITHUB_STEP_SUMMARY

  cleanup:
    needs: [prereq, deploy]
    if: always() && needs.prereq.result == 'success'
    uses: HeliumEdu/.github/.github/workflows/release-cleanup.yml@main
    secrets:
      bot_app_id: ${{ secrets.HELIUM_BOT_APP_ID }}
      bot_private_key: ${{ secrets.HELIUM_BOT_PRIVATE_KEY }}
