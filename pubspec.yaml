name: heliumapp
description: "Helium is a smart student planner that lets organizes your classes, assignments, and grades into one color-coordinated calendar for academic success."

publish_to: 'none'

version: 3.5.11+224

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: 1.1.1
  logging: 1.3.0
  sentry_flutter: 9.16.1
  sentry_dio: 9.16.1
  meta: 1.17.0
  collection: 1.19.1
  google_fonts: 8.0.2
  dio: 5.9.2
  pretty_dio_logger: 1.4.0
  dio_cache_interceptor: 4.0.6
  bloc: 9.2.0
  flutter_bloc: 9.1.1
  shared_preferences: 2.5.5
  flutter_secure_storage: 10.0.0
  device_info_plus: 12.4.0
  package_info_plus: 9.0.1
  path_provider: 2.1.5
  permission_handler: 12.0.1
  firebase_core: 4.7.0
  firebase_analytics: 12.3.0
  firebase_messaging: 16.2.0
  firebase_auth: 6.4.0
  google_sign_in: 7.2.0
  sign_in_button: 4.1.0
  timezone: 0.11.0
  flutter_timezone: 5.0.2
  intl: 0.20.2
  flutter_local_notifications: 21.0.0
  syncfusion_flutter_core: 33.1.49
  syncfusion_flutter_calendar: 33.1.49
  syncfusion_flutter_charts: 33.1.49
  syncfusion_flutter_gauges: 33.1.49
  syncfusion_flutter_datagrid: 33.1.49
  syncfusion_localizations: 33.1.49
  flutter_quill: 11.5.0
  flutter_quill_to_pdf: ^2.3.9
  pdf: ^3.12.0
  printing: ^5.14.3
  uuid: ^4.5.3
  flutter_html: 3.0.0
  flutter_colorpicker: 1.1.0
  file_picker: 10.3.10
  in_app_review: 2.0.11
  url_launcher: 6.3.2
  share_plus: 12.0.2
  go_router: 17.2.1
  dio_smart_retry: 7.0.1
  html: 0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  test_api: ^0.7.0
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.7
  flutter_lints: 6.0.0
  firebase_core_platform_interface: 6.0.3
  bloc_test: 10.0.0
  mocktail: 1.0.4
  plugin_platform_interface: 2.1.8
  cider: 0.2.10
  minio: 3.5.8
  http: 1.6.0
  webdriver: 3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: DM Serif Display
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
          weight: 400
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400

flutter_native_splash:
  color: "#418eb9"
  image: assets/img/icon.png
  android: true
  ios: true
  web: true

  android_12:
    color: "#418eb9"
    image: assets/img/splash_android12.png
